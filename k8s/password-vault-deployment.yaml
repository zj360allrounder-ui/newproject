apiVersion: apps/v1
kind: Deployment
metadata:
  name: password-vault-manager
  labels:
    app: password-vault-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: password-vault-manager
  template:
    metadata:
      labels:
        app: password-vault-manager
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: password-vault-secret
                  key: ADMIN_TOKEN
            - name: SIGNUPS_ALLOWED
              value: "false"
          volumeMounts:
            - name: vault-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: vault-data
          persistentVolumeClaim:
            claimName: password-vault-pvc
