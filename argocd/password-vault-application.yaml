apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: password-vault-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zj360allrounder-ui/newproject.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
      include: "password-vault-*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
